<!DOCTYPE html>
<html lang="ti">
  <head>
    <title>ሰባት ኣብ መጽሓፍ ቅዱስ</title>
    <link rel="stylesheet" type="text/css" href="./stylesheet.css" />
    <link rel="icon" type="image/x-icon" href="./assets/faviacts.jpg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../data/ppls.js"></script>
    <script src="../data/plc.js"></script>
    
    <script src="../data/ver.js"></script>
  </head>
  <body>
    <div class="bo">
      <div class="list">
        <div class="ppl">
          <h2>ኣስማት ሰባት</h2>
          <form>
            <input id="searchInput" type="text" placeholder="Search names..."> <button id="searchButton" type="button">search</button>
          </form>
         
          <div class="js-pplList">   </div>
        </div>
        <div class="detaile">
          <h2>ሓበሬታ ሰባት</h2>
          <div class="js-pplDetail"></div>

        </div>
      </div>
    </div>
     <div><a href="https://docs.google.com/forms/d/e/1FAIpQLSduaQQSwAUTD5Y6EuvoVArlR06qRO55GJonebrXt1udPpsfrw/viewform?usp=sharing&ouid=111947718828909702830">ንምእራምን ንምምዕርራይን ኣብዚኣ ጠውቑ</a>
    </div>
    </div>
    <script>      
      const pplListEl = document.querySelector('.js-pplList');
      const detailEl = document.querySelector('.js-pplDetail');
      function disPp(p){
        const adres = p
          ? p.adres
              .map(
                (item) => `
          <li>${item}</li>`
              )
              .join("")
          : "";
        const title = p.title
          ? p.title.map((item) => `<li>${item}</li>`).join(""): "";
        const info = p.info ? p.info.map((item) => `<li>${item}</li>`).join("") : "";
        const vers = p.ver ? p.ver.map((item) => `<li>${item}</li>`).join("") : "";
        detailEl.innerHTML = `
        <h4> ${p.name1} (${p.nameE1})</h4>
        <h4> ${p.nameM1} </h4>
        <h4> ${p.name2} ${p.nameE2}</h4>
        <h4> ${p.nameM2} </h4>
        <h4> ID :  ${p.id} </h4>
        <ul>${adres}</ul>
        <ul>${title}</ul>
        <ul>${vers}</ul>
        <ul>${info}</ul>
        `
      }
      
     
      fetch('./data/ppls.json')
        .then(r => r.json())// load json
        
        .then(data => {
          //console.log(data);
          // normalize top-level shape: object -> array, or already array
          const pplArray = Array.isArray(data) ? data : Object.values(data);
          let fullPplArray = [...pplArray]; // store full list for searching

          function renderList(filteredArray) {
            pplListEl.innerHTML = '';
            filteredArray.forEach(item => {
              // item might itself be an array [person, ...], or an object { person: {...} }, or the person directly
              let person = Array.isArray(item) ? item[0] : item;
              if (person && person.person) person = person.person;

              if (!person) return; // skip bad entries

              const li = document.createElement('li');
              li.style.cursor = 'pointer';
              li.textContent = person.name1 +' '+ person.name2+' '+ person.id || person.nameE1 || person.name || 'Unknown';

              li.addEventListener('click', () => {
                if (typeof disPp === 'function') disPp(person);
                else console.warn('display function disPp not found', person);
              });

              pplListEl.appendChild(li);
            });
          }

          renderList(pplArray); // initial render

          // Add search functionality
          const searchInput = document.getElementById('searchInput');
          const searchButton = document.getElementById('searchButton');

          searchButton.addEventListener('click', () => {
            const query = searchInput.value.toLowerCase().trim();
            if (query === '') {
              renderList(fullPplArray);
            } else {
              const filtered = fullPplArray.filter(item => {
                let person = Array.isArray(item) ? item[0] : item;
                if (person && person.person) person = person.person;
                if (!person) return false;
                const name1 = (person.name1 || '').toLowerCase();
                const name2 = (person.name2 || '').toLowerCase();
                const nameE1 = (person.nameE1 || '').toLowerCase();
                const name = (person.name || '').toLowerCase();
                return name1.includes(query) || name2.includes(query) || nameE1.includes(query) || name.includes(query);
              });
              renderList(filtered);
            }
            // Clear details when searching
            detailEl.innerHTML = '';
          });

          //console.log('rendered', pplListEl.children.length);
        });
  
        
    </script>
    

  </body>
</html>
